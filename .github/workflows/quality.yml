name: Research quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install PDF inspection tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Run repository quality gate
        env:
          QUALITY_PYTEST_WORKERS: auto
        run: python3 scripts/run_quality_checks.py

  clean-clone-cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync quality/runtime Python environment
        run: uv sync --locked --only-group quality --python 3.12

      - name: Verify allowlisted clean-clone CPU recipes
        run: uv run --no-sync python scripts/regen.py verify-clean-clone
