name: Research quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run repository quality gate
        run: python3 scripts/run_quality_checks.py

      - name: Run focused pytest-only regression tests
        run: >-
          uvx --python 3.12 --with pytest python -m pytest -q
          tests/test_primer_numeric_examples.py
