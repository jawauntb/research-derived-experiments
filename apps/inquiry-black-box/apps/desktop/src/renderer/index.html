<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquiry Black Box</title>
    <style>
      :root {
        color: #17202a;
        background: #f6f7f9;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 1px solid #b9c2ce;
        border-radius: 6px;
        background: #ffffff;
        color: #17202a;
        cursor: pointer;
        min-height: 34px;
        padding: 6px 10px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      #app {
        display: grid;
        gap: 16px;
        margin: 0 auto;
        max-width: 1180px;
        padding: 20px;
      }

      .app-header,
      .session-controls,
      .camera-panel,
      .privacy-settings,
      .replay-timeline {
        background: #ffffff;
        border: 1px solid #d8dee7;
        border-radius: 8px;
        padding: 16px;
      }

      .app-header {
        display: grid;
        gap: 12px;
      }

      .app-header h1,
      .replay-timeline h2,
      .privacy-settings h2 {
        font-size: 18px;
        line-height: 1.2;
        margin: 0;
      }

      .app-status-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .app-status-item {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .app-status-label {
        color: #5f6f82;
        font-size: 12px;
        text-transform: uppercase;
      }

      .app-status-value,
      .pairing-token {
        overflow-wrap: anywhere;
      }

      .session-toolbar,
      .session-labels,
      .camera-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .session-button-primary {
        background: #116149;
        border-color: #116149;
        color: #ffffff;
      }

      .session-button-danger {
        border-color: #be3347;
        color: #9f2637;
      }

      .recording-state {
        display: inline-flex;
        width: fit-content;
      }

      .recording-state-active {
        color: #116149;
      }

      .recording-state-paused {
        color: #7c5d00;
      }

      .privacy-settings {
        display: grid;
        gap: 10px;
      }

      .privacy-settings__row {
        align-items: center;
        display: flex;
        gap: 8px;
      }

      .replay-timeline ol,
      .replay-timeline ul {
        margin-bottom: 0;
        padding-left: 22px;
      }

      .replay-timeline li {
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
