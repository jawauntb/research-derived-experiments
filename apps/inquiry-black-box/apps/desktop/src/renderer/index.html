<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquiry Black Box</title>
    <style>
      :root {
        --surface: #f3f1eb;
        --surface-raised: #fbfaf6;
        --surface-inset: #e7e3da;
        --ink: #151515;
        --muted: #68645d;
        --line: #d6d0c4;
        --teal: #087d73;
        --green: #0f6b55;
        --green-soft: #dceee8;
        --amber: #8a5b00;
        --amber-soft: #fff3cf;
        --rose: #a83347;
        --rose-soft: #f9dfe5;
        --blue: #2d5d7c;
        --blue-soft: #dceaf7;
        --shadow-raised: 0 10px 28px rgba(89, 80, 68, 0.12);
        --shadow-pressed: inset 0 0 0 1px rgba(124, 112, 96, 0.14);
        --focus: 0 0 0 3px rgba(8, 125, 115, 0.24);
        color-scheme: light;
        color: var(--ink);
        background: var(--surface);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      :root[data-theme="dark"] {
        --surface: #151816;
        --surface-raised: #202622;
        --surface-inset: #101311;
        --ink: #f3f1eb;
        --muted: #a8b0aa;
        --line: #3a453f;
        --teal: #55c7bc;
        --green: #74d1b8;
        --green-soft: #17372f;
        --amber: #f0bf63;
        --amber-soft: #3d3015;
        --rose: #f08da0;
        --rose-soft: #3c2029;
        --blue: #8bb9df;
        --blue-soft: #1c3346;
        --shadow-raised: 0 12px 30px rgba(0, 0, 0, 0.24);
        --shadow-pressed: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        --focus: 0 0 0 3px rgba(85, 199, 188, 0.28);
        color-scheme: dark;
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]) {
          --surface: #151816;
          --surface-raised: #202622;
          --surface-inset: #101311;
          --ink: #f3f1eb;
          --muted: #a8b0aa;
          --line: #3a453f;
          --teal: #55c7bc;
          --green: #74d1b8;
          --green-soft: #17372f;
          --amber: #f0bf63;
          --amber-soft: #3d3015;
          --rose: #f08da0;
          --rose-soft: #3c2029;
          --blue: #8bb9df;
          --blue-soft: #1c3346;
          --shadow-raised: 0 12px 30px rgba(0, 0, 0, 0.24);
          --shadow-pressed: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
          --focus: 0 0 0 3px rgba(85, 199, 188, 0.28);
          color-scheme: dark;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--surface);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        background: var(--surface-raised);
        box-shadow: var(--shadow-raised);
        color: var(--ink);
        cursor: pointer;
        font-weight: 700;
        min-height: 40px;
        padding: 8px 13px;
      }

      button:hover:not(:disabled) {
        border-color: var(--line);
      }

      button:active:not(:disabled) {
        box-shadow: var(--shadow-pressed);
        transform: translateY(1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.54;
      }

      button:focus-visible,
      input:focus-visible,
      textarea:focus-visible {
        box-shadow: var(--focus), var(--shadow-raised);
        outline: none;
      }

      #app {
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1fr);
        margin: 0 auto;
        max-width: 1180px;
        padding: 20px;
      }

      .app-header,
      .session-controls,
      .camera-panel,
      .privacy-settings,
      .replay-timeline,
      .interpretation-panel,
      .daily-review-panel,
      .probe-panel {
        background: var(--surface-raised);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow-raised);
        padding: 16px;
      }

      .app-header {
        display: grid;
        gap: 14px;
      }

      .app-brand {
        display: grid;
        gap: 5px;
      }

      .app-eyebrow {
        color: var(--teal);
        display: block;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.11em;
        line-height: 1.2;
        text-transform: uppercase;
      }

      .app-header .app-brand h1 {
        font-size: 30px;
        letter-spacing: -0.03em;
      }

      .app-tagline,
      .connection-card__help,
      .session-helper {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        margin: 0;
      }

      .connection-card {
        background: var(--surface-inset);
        border: 1px solid var(--line);
        border-radius: 12px;
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .connection-card__header,
      .session-controls__header {
        align-items: start;
        display: flex;
        gap: 12px;
        justify-content: space-between;
      }

      .connection-card h2,
      .session-controls h2 {
        font-size: 17px;
        line-height: 1.25;
        margin: 3px 0 0;
      }

      .connection-status,
      .recording-state {
        background: var(--surface-raised);
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        flex: 0 0 auto;
        font-size: 12px;
        font-weight: 800;
        padding: 6px 10px;
      }

      .connection-status-ready {
        background: var(--green-soft);
        border-color: transparent;
        color: var(--green);
      }

      .connection-details summary {
        box-sizing: border-box;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 750;
        min-height: 36px;
        padding: 9px 0;
      }

      .connection-details[open] summary {
        margin-bottom: 8px;
      }

      .connection-details__grid {
        display: grid;
        gap: 8px;
      }

      .app-header h1,
      .replay-timeline h2,
      .interpretation-panel h2,
      .daily-review-panel h2,
      .privacy-settings h2,
      .probe-panel h2 {
        font-size: 18px;
        line-height: 1.2;
        margin: 0;
      }

      .app-header-notice {
        background: var(--blue-soft);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--blue);
        font-size: 13px;
        line-height: 1.4;
        margin: 0;
        padding: 9px 10px;
      }

      .app-status-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .app-status-item {
        background: var(--surface-raised);
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: none;
        display: grid;
        gap: 4px;
        min-width: 0;
        padding: 10px;
      }

      .app-status-label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .app-status-value,
      .pairing-token {
        overflow-wrap: anywhere;
      }

      .session-toolbar,
      .session-labels,
      .camera-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .session-button-primary {
        background: var(--green);
        border-color: var(--green);
        color: #ffffff;
      }

      .session-button-danger {
        background: var(--rose-soft);
        border-color: var(--rose-soft);
        color: var(--rose);
      }

      .recording-state {
        display: inline-flex;
        width: fit-content;
      }

      .recording-state-active {
        color: var(--green);
      }

      .recording-state-paused {
        color: var(--amber);
      }

      .privacy-settings {
        display: grid;
        gap: 10px;
      }

      .privacy-settings__status {
        align-items: start;
        background: var(--surface-inset);
        border-radius: 8px;
        box-shadow: var(--shadow-pressed);
        display: grid;
        gap: 4px;
        min-height: 56px;
        padding: 10px;
      }

      .privacy-settings__status span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      .privacy-settings__row {
        align-items: center;
        background: var(--surface-inset);
        border-radius: 8px;
        box-shadow: var(--shadow-pressed);
        display: grid;
        gap: 8px;
        grid-template-columns: auto minmax(0, 1fr) auto;
        min-height: 34px;
        padding: 6px 10px;
      }

      .privacy-settings__row-disabled {
        opacity: 0.72;
      }

      .privacy-settings__text {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      .privacy-settings__text > span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .privacy-settings__badge {
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        justify-self: end;
        min-width: 44px;
        padding: 4px 8px;
        text-align: center;
      }

      .privacy-settings__badge-good,
      .privacy-settings__status-good strong {
        background: var(--green-soft);
        color: var(--green);
      }

      .privacy-settings__badge-warn,
      .privacy-settings__status-warn strong {
        background: var(--amber-soft);
        color: var(--amber);
      }

      .privacy-settings__badge-blocked,
      .privacy-settings__status-blocked strong {
        background: var(--rose-soft);
        color: var(--rose);
      }

      .privacy-settings__badge-muted,
      .privacy-settings__status-muted strong {
        background: var(--surface-raised);
        color: var(--muted);
      }

      .theme-preference {
        align-items: center;
        background: var(--surface-inset);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow-pressed);
        display: grid;
        gap: 4px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        max-width: none;
        padding: 4px;
      }

      .theme-preference__button {
        box-shadow: none;
        font-size: 12px;
        min-height: 36px;
        padding: 4px 8px;
      }

      .theme-preference__button-active {
        background: var(--green);
        color: #fff;
      }

      input[type="checkbox"] {
        accent-color: var(--green);
      }

      textarea,
      input[type="range"] {
        accent-color: var(--blue);
      }

      .camera-status-list {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        margin: 12px 0 0;
      }

      .camera-status-list dt {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .camera-status-list dd {
        background: var(--surface-inset);
        border-radius: 8px;
        box-shadow: var(--shadow-pressed);
        margin: 0;
        min-height: 58px;
        padding: 10px;
      }

      .camera-status-line {
        display: grid;
        gap: 4px;
      }

      .camera-status-line-good strong {
        color: var(--green);
      }

      .camera-status-line-warn strong {
        color: var(--amber);
      }

      .camera-status-line-blocked strong {
        color: var(--rose);
      }

      .camera-status-line-muted strong,
      .camera-privacy-note {
        color: var(--muted);
      }

      .camera-quality-flags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        list-style: none;
        margin: 12px 0 0;
        padding: 0;
      }

      .camera-quality-flags li {
        background: var(--amber-soft);
        border-radius: 8px;
        color: var(--amber);
        padding: 5px 8px;
      }

      .replay-timeline ol,
      .replay-timeline ul {
        margin-bottom: 0;
        padding-left: 22px;
      }

      .replay-timeline li {
        margin: 8px 0;
      }

      .replay-state,
      .replay-evidence,
      .replay-heatmap,
      .interpretation-empty,
      .daily-review-empty,
      .interpretation-themes li,
      .interpretation-llm,
      .daily-review-group {
        background: var(--surface-inset);
        border-radius: 8px;
        box-shadow: var(--shadow-pressed);
        margin-top: 12px;
        padding: 12px;
      }

      .replay-state h3,
      .replay-evidence h3,
      .replay-heatmap h3,
      .daily-review-group h3 {
        font-size: 14px;
        margin: 0 0 8px;
      }

      .replay-state p,
      .replay-evidence p,
      .replay-heatmap p,
      .interpretation-panel p,
      .daily-review-panel p,
      .probe-panel p,
      .camera-privacy-note {
        font-size: 13px;
        line-height: 1.45;
        margin: 8px 0 0;
      }

      .interpretation-themes,
      .interpretation-actions,
      .daily-review-group ol {
        margin-bottom: 0;
        padding-left: 22px;
      }

      .interpretation-themes li,
      .daily-review-group li {
        margin: 8px 0;
      }

      .interpretation-summary,
      .daily-review-summary {
        color: var(--ink);
        font-size: 14px;
      }

      .daily-review-refresh-status {
        background: var(--surface-inset);
        border-radius: 8px;
        box-shadow: var(--shadow-pressed);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
        margin: 0;
        padding: 8px 10px;
      }

      .daily-review-refresh-status-refreshed {
        color: var(--green);
      }

      .daily-review-refresh-status-failed {
        color: var(--rose);
      }

      .interpretation-llm {
        display: grid;
        gap: 8px;
      }

      .interpretation-llm__button {
        background: var(--blue-soft);
        border-color: var(--blue-soft);
        color: var(--blue);
        justify-self: start;
      }

      .interpretation-llm__context {
        background: var(--surface-raised);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        min-height: 76px;
        padding: 10px;
        resize: vertical;
        width: 100%;
      }

      .interpretation-llm__status {
        color: var(--muted);
        margin: 0;
      }

      .interpretation-limitations,
      .evidence-ref {
        color: var(--muted);
      }

      .daily-review-header {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
      }

      .suggestion-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .suggestion-controls button {
        font-size: 12px;
        min-height: 30px;
        padding: 5px 8px;
      }

      .replay-timeline__actions {
        background: var(--blue-soft);
        border-radius: 8px;
        color: var(--blue);
        margin-top: 12px;
        padding-bottom: 10px;
        padding-top: 10px;
      }

      .probe-panel textarea {
        background: var(--surface-inset);
        border: 1px solid transparent;
        border-radius: 8px;
        box-shadow: var(--shadow-pressed);
        display: block;
        margin-top: 10px;
        min-height: 88px;
        padding: 10px;
        resize: vertical;
        width: 100%;
      }

      .probe-panel input[type="range"] {
        display: block;
        margin: 12px 0;
        width: 100%;
      }

      #app {
        display: block;
        margin: 0 auto;
        max-width: 1360px;
        padding: 22px;
      }

      .app-shell {
        display: grid;
        gap: 20px;
        grid-template-columns: minmax(340px, 390px) minmax(0, 1fr);
        min-height: calc(100vh - 44px);
      }

      .app-rail,
      .app-canvas {
        align-content: start;
        display: grid;
        gap: 20px;
      }

      .app-rail > *,
      .app-canvas > * {
        min-width: 0;
      }

      .session-history__list {
        display: grid;
        gap: 8px;
        list-style: none;
        margin: 12px 0 0;
        padding: 0;
      }

      .session-history__item {
        background: var(--surface-inset);
        border: 1px solid transparent;
        border-radius: 8px;
        box-shadow: var(--shadow-pressed);
        cursor: pointer;
        display: grid;
        gap: 4px;
        padding: 10px;
        text-align: left;
        width: 100%;
      }

      .session-history__item-active {
        border-color: var(--green);
      }

      .session-history__meta,
      .session-history__verdict,
      .session-history__empty {
        color: var(--muted);
        font-size: 12px;
      }

      .session-title-field {
        display: grid;
        gap: 6px;
        font-size: 12px;
        margin-top: 14px;
      }

      .session-title-input {
        background: var(--surface-inset);
        border: 1px solid transparent;
        border-radius: 8px;
        box-shadow: var(--shadow-pressed);
        min-height: 44px;
        padding: 0 10px;
        width: 100%;
      }

      .pairing-token-item {
        gap: 8px;
      }

      .pairing-token-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pairing-token-controls button {
        font-size: 12px;
        min-height: 36px;
        padding: 6px 10px;
      }

      .session-controls {
        border-color: color-mix(in srgb, var(--teal) 42%, var(--line));
      }

      .session-toolbar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }

      .session-toolbar button {
        min-height: 44px;
      }

      .session-labels__heading {
        font-size: 12px;
        font-weight: 800;
        margin: 16px 0 -4px;
      }

      .session-labels button {
        box-shadow: none;
        min-height: 36px;
      }

      .privacy-settings__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
      }

      .privacy-delete-button {
        background: var(--rose-soft);
        border-color: var(--rose-soft);
        color: var(--rose);
      }

      .privacy-export-button {
        background: var(--blue-soft);
        border-color: var(--blue-soft);
        color: var(--blue);
      }

      .privacy-upgrade-hint {
        color: var(--blue);
        font-size: 12px;
        margin-top: 6px;
      }

      .probe-field {
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin-top: 10px;
      }

      .probe-confidence-readout {
        color: var(--muted);
        display: block;
        font-size: 12px;
        margin-bottom: 8px;
      }

      .replay-demo-button {
        background: var(--teal-soft, var(--green-soft));
        border-color: var(--green);
        color: var(--green);
        margin-top: 10px;
      }

      .replay-limitations {
        margin-top: 12px;
      }

      @media (max-width: 899px) {
        #app {
          padding: 14px;
        }

        .app-shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
