  <text x="504" y="502" fill="#151515" font-family="Inter, Arial, sans-serif" font-size="15">Themes, limitations, and next actions stay grounded in local evidence.</text>
  <rect x="796" y="424" width="300" height="170" rx="8" fill="#dceaf7"/>
  <text x="828" y="466" fill="#2d5d7c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Optional LLM summary</text>
  <text x="828" y="502" fill="#151515" font-family="Inter, Arial, sans-serif" font-size="15">Only redacted counts, themes, and limitations leave the device.</text>
