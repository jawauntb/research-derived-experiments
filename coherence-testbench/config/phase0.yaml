# Phase-0 run config. Reads kill_criterion.yaml; do NOT override thresholds here.

kill_criterion: "config/kill_criterion.yaml"

data:
  dataset: "bbbd"
  cache_dir_env: "BBBD_CACHE_DIR"
  # Exp 1: eyetrack-only (no EEG). Exp 5: no attentive-vs-distracted contrast
  # (ses-02 is a monetary-incentive intervention, both sessions attentive).
  # See docs/bbbd_label_protocol.md.
  experiments: [2, 3, 4]
  subject_limit: null           # null = all subjects; set an int for smoke tests

preprocess:
  highpass_hz: 0.05
  notch_hz: [60.0]
  resample_hz: 128
  notch_16hz_experiments: [4, 5]
  epoch_seconds: 4.0
  epoch_overlap: 0.5
  reject_peak_to_peak_uv: 150.0

decoders:
  baseline:
    kind: "per_subject_riemann"
    n_folds: 5
  target:
    kind: "cross_subject_adversarial"
    alignment: "riemann"          # euclidean | riemann
    adversary_weight: 0.1
    ssl_pretrain: true            # masked-feature reconstruction warm-start
    epochs: 30
    batch_size: 64
    lr: 3.0e-4

evaluate:
  scheme: "leave_subjects_out"
  n_lso_seeds: 5
  # BBBD exp 2/3/4 have 31/29/43 subjects — cap the sweep to what actually fits
  # after the 20% LSO test hold-out. The LSO code silently skips n_train values
  # that exceed the available train pool.
  train_subject_sweep: [4, 8, 16, 24]

output:
  root: "artifacts/phase0"
  run_manifest: "manifest.json"
  jsonl_log: "run.jsonl"
  report: "report.md"
