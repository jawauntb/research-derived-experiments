# Branch-D eyetrack Phase-0 config. Reads kill_criterion_eyetrack.yaml.

kill_criterion: "config/kill_criterion_eyetrack.yaml"

data:
  dataset: "bbbd"
  cache_dir_env: "BBBD_CACHE_DIR"
  # Same exp set as EEG branch — session-level attention contrast on
  # exp 2/3/4. Exp 1 has eyetrack but no attention protocol; exp 5's ses-02
  # is monetary incentive, not distraction.
  experiments: [2, 3, 4]
  subject_limit: null

preprocess:
  epoch_seconds: 4.0
  epoch_overlap: 0.5
  saccade_speed_deg_s: 30.0

decoders:
  baseline:
    kind: "per_subject_lr"
    n_folds: 5
  target:
    kind: "cross_subject_eyetrack_adv"
    adversary_weight: 0.1
    ssl_pretrain: true              # enabled after INCONCLUSIVE gen-1 run
    epochs: 60                       # more compute per fold
    batch_size: 64
    lr: 3.0e-4

evaluate:
  scheme: "leave_subjects_out"
  n_lso_seeds: 5
  # exp4 has 43 subjects → ~34 train pool. Extend sweep to catch the tail.
  train_subject_sweep: [4, 8, 16, 24, 32]

output:
  root: "artifacts/phase0_eyetrack"
  report: "report.md"
