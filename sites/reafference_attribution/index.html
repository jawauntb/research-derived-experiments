<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Mechanism Atlas</title>
  <link rel="stylesheet" href="styles.css?v=atlas-11">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#overview" aria-label="Research mechanism atlas home">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>mechanism atlas</span>
    </a>
    <nav class="nav" aria-label="Experiment visualizations"></nav>
  </header>

  <main class="app-shell">
    <section class="workspace" aria-labelledby="view-title">
      <div class="visual-column">
        <div class="visual-heading">
          <p id="view-kicker" class="kicker"></p>
          <h1 id="view-title"></h1>
          <p id="view-subtitle" class="subtitle"></p>
        </div>
        <div class="visual-stage">
          <canvas id="atlas-canvas" aria-label="Animated mechanism visualization"></canvas>
          <div class="stage-hud" aria-live="polite">
            <span id="phase-label"></span>
            <span id="phase-value"></span>
          </div>
          <div class="phase-track" aria-hidden="true">
            <span id="phase-fill"></span>
          </div>
        </div>
        <div class="control-row">
          <button id="pause-button" class="control-button" type="button" aria-label="Pause animation">pause</button>
          <button id="tour-button" class="control-button" type="button" aria-label="Start reviewer tour">tour off</button>
          <button id="story-button" class="control-button" type="button" aria-label="Turn story mode off">story on</button>
          <label class="speed-control" for="speed-range">
            speed
            <input id="speed-range" type="range" min="0.4" max="1.8" value="1" step="0.1">
          </label>
          <button id="labels-button" class="control-button" type="button" aria-label="Toggle dense labels">labels on</button>
          <div class="tour-status" aria-live="polite">
            <span id="tour-status-text">manual path</span>
            <span class="tour-meter" aria-hidden="true"><span id="tour-fill"></span></span>
          </div>
        </div>
      </div>

      <aside class="readout" aria-label="Mechanism notes">
        <div class="readout-section">
          <h2>mechanism</h2>
          <p id="mechanism-thesis"></p>
        </div>
        <div class="readout-section">
          <h2>live variables</h2>
          <div id="metric-list" class="metric-list"></div>
        </div>
        <div class="readout-section">
          <h2>what moves</h2>
          <ul id="motion-list"></ul>
        </div>
        <div class="readout-section">
          <h2>source</h2>
          <div id="source-links" class="source-links"></div>
        </div>
      </aside>
    </section>

    <section class="experiment-strip" aria-label="Experiment pages">
      <div id="experiment-cards" class="experiment-cards"></div>
    </section>
  </main>

  <script src="app.js?v=atlas-11"></script>
</body>
</html>
